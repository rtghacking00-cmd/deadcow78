<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Reacher">
  <title>Reacher</title>
  <link rel="apple-touch-icon" href="https://rtghacking00-cmd.github.io/deadcow78/profile_icon_256.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #frame {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe
    id="frame"
    src="https://sentinet.x10.mx/reacher/"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups-to-escape-sandbox allow-presentation"
    allowfullscreen
    allow="fullscreen"
  ></iframe>
  <script>
    // Force all links to stay in the iframe
    document.getElementById('frame').addEventListener('load', function() {
      try {
        var doc = this.contentDocument || this.contentWindow.document;
        doc.addEventListener('click', function(e) {
          var a = e.target.closest('a');
          if (a && a.target === '_blank') {
            a.target = '_self';
          }
        });
      } catch(e) {}
    });
  </script>
</body>
</html>
